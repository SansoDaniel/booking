name: project_architecture
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^16.3.0
  get_it: ^8.0.3
  gap: ^3.0.1
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  toastification: ^3.0.3
  permission_handler: ^12.0.0+1
  dio: ^5.8.0+1
  injectable: ^2.5.2
  lottie: ^3.3.2
  path: any
  equatable: ^2.0.7
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0

  localization:
    path: ./local_plugins/localization
  design_system:
    path: ./local_plugins/design_system

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.10.1
  mason_cli: ^0.1.3
  flutter_launcher_icons: ^0.14.3
  yaml_edit: ^2.2.2
  yaml: ^3.1.3
  injectable_generator: ^2.8.1
  go_router_builder: ^4.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - development/mock/


